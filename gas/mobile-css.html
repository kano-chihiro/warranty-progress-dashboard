<style>
/* ============================================
   Responsive CSS — 保証進捗ダッシュボード
   デスクトップUIをモバイルでも使えるようにする
   ※ screen指定で印刷CSSと干渉しないようにする
   ============================================ */

/* === Device Routing === */
/* モバイル専用UIは常に非表示。デスクトップUIを全デバイスで表示 */
#mobileApp { display: none !important; }

/* === Mobile Responsive (screen only, 印刷時は適用しない) === */
@media screen and (max-width: 768px) {

    /* --- モバイルスケーリング: 55%表示 --- */
    html {
        zoom: 0.55 !important;
        -webkit-zoom: 0.55 !important;
    }

    /* --- 全体レイアウト --- */
    html, body {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
    }

    .app-container {
        border-radius: 0;
        border: none;
        box-shadow: none;
        max-width: 100%;
    }

    /* --- ヘッダー --- */
    .header {
        flex-wrap: wrap;
        padding: 12px 16px;
        gap: 8px;
    }

    .header-left {
        flex: 1;
        min-width: 0;
    }

    .header-title h1 {
        font-size: 1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .update-date {
        font-size: 0.7rem;
        padding: 2px 8px;
    }

    .view-toggle {
        order: 3;
        width: 100%;
        justify-content: stretch;
    }

    .view-toggle-btn {
        flex: 1;
        padding: 8px 4px;
        font-size: 12px;
        min-height: 36px;
    }

    .header-actions {
        flex-shrink: 0;
    }

    .header-actions button {
        padding: 6px 10px;
        font-size: 11px;
        min-height: 32px;
    }

    .btn-unlock {
        font-size: 10px !important;
        padding: 4px 8px !important;
    }

    /* --- メインコンテンツ: 1カラムに --- */
    .main-content {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid var(--border-color, rgba(26, 24, 20, 0.08));
        padding: 16px 12px;
        gap: 12px;
    }

    .right-panel {
        padding: 16px 12px;
        gap: 16px;
    }

    /* --- テーブル --- */
    .data-table,
    .service-table,
    .hardware-table {
        font-size: 12px;
    }

    .data-table th,
    .service-table th,
    .hardware-table th {
        padding: 8px 6px;
        font-size: 10px;
    }

    .data-table td,
    .service-table td,
    .hardware-table td {
        padding: 6px 4px;
    }

    /* --- 入力フィールド (iOS 自動ズーム防止) --- */
    #desktopApp input[type="number"],
    #desktopApp input[type="text"],
    #desktopApp select {
        font-size: 16px;
        min-height: 36px;
        -webkit-appearance: none;
        appearance: none;
    }

    .cell-with-unit input {
        width: 60px;
    }

    /* --- セクションカード --- */
    .section-card {
        border-radius: 10px;
    }

    .section-header {
        padding: 10px 12px;
    }

    .section-title {
        font-size: 13px;
    }

    .section-body {
        padding: 10px 12px;
    }

    /* --- 予算セクション --- */
    .budget-section {
        padding: 12px 14px;
    }

    .budget-inputs {
        flex-direction: column;
        gap: 10px;
    }

    .budget-input-wrapper input {
        width: 100%;
    }

    /* --- サービスビュー予算 --- */
    .service-budget-grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .service-budget-item input {
        font-size: 16px;
    }

    /* 小計行 — 背景の重なりを避け白ベースに */
    .m-service-table tr.m-subtotal td {
        background: var(--nk-bg-white);
        border-top: 2px solid var(--nk-border-light);
        font-weight: 600;
    }

    .m-hw-table tr.m-subtotal td {
        background: var(--nk-bg-white);
        border-top: 2px solid rgba(139, 115, 85, 0.22);
        font-weight: 600;
    }

    /* --- ハードビュー予算 --- */
    .hardware-budget-section {
        padding: 12px 14px;
    }

    .hardware-budget-grid {
        grid-template-columns: 1fr;
    }

    .hardware-budget-item select {
        font-size: 14px;
    }

    /* --- プログレスバー --- */
    .progress-panel {
        padding: 12px;
    }

    .progress-grid {
        gap: 12px;
    }

    .progress-name,
    .hardware-progress-name,
    .service-progress-name {
        font-size: 12px;
    }

    /* --- チャートエリア --- */
    .donut-chart-container {
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .donut-chart-visual {
        width: 160px;
        height: 160px;
    }

    .donut-chart-legend {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }

    .stats-grid {
        gap: 8px;
    }

    .stat-card,
    .service-stat-card,
    .hardware-stat-card {
        padding: 12px 8px;
    }

    .stat-value {
        font-size: 1.6rem;
    }

    .stat-label,
    .service-stat-label,
    .hardware-stat-label {
        font-size: 10px;
    }

    .chart-card {
        padding: 12px;
    }

    .chart-wrapper {
        height: 200px;
    }

    /* --- 予算達成メーター --- */
    .budget-achievement-meter {
        padding: 8px 12px;
    }

    .service-budget-meter {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
    }

    .service-budget-meter-item {
        flex: 1;
        min-width: 70px;
    }

    .service-budget-meter-value {
        font-size: 0.9rem;
    }

    /* --- カメラ残りTIP --- */
    .camera-remaining-tip {
        padding: 8px 10px;
    }

    .camera-remaining-text {
        font-size: 12px;
    }

    /* --- ハードプレビュー: モバイルでは常に縦積み --- */
    .preview-mode #hardwareCharts.has-remaining .chart-card {
        grid-column: 1 / -1;
    }

    .preview-mode #hardwareCharts.has-remaining .hw-print-remaining {
        grid-column: 1 / -1;
    }

    /* --- フッターアクション --- */
    .footer-actions {
        padding: 12px 16px;
        gap: 8px;
        flex-wrap: wrap;
    }

    .footer-actions .btn {
        flex: 1;
        min-width: 80px;
        min-height: 40px;
        font-size: 13px;
    }

    /* --- プレビューモード調整 --- */
    .preview-mode .main-content {
        display: flex;
        flex-direction: column;
    }

    .preview-mode .left-panel {
        display: none;
    }

    .preview-mode .right-panel {
        padding: 12px;
    }

    .preview-mode .donut-chart-container {
        flex-direction: column;
    }

    .preview-mode .stats-grid {
        grid-template-columns: repeat(3, 1fr);
    }

    .preview-mode .stat-value {
        font-size: 1.8rem;
    }

    /* --- 予算プログレスバー --- */
    .budget-progress-container {
        padding: 12px;
    }

    .budget-amounts {
        font-size: 0.8rem;
    }

    .budget-breakdown {
        flex-direction: column;
        gap: 4px;
    }

    /* 目標添付率（モバイル）: %は固定、数値のみ編集 */
    .m-rate-suffix {
        font-size: 0.85em;
        color: var(--text-tertiary, #8a8378);
        margin-left: 2px;
        user-select: none;
        pointer-events: none;
    }
}

/* === 極小画面 (screen only) === */
@media screen and (max-width: 400px) {
    .header-title h1 {
        font-size: 0.9rem;
    }

    .view-toggle-btn {
        font-size: 11px;
        padding: 6px 2px;
    }

    .stats-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
    }

    .stat-value {
        font-size: 1.3rem;
    }

    .service-stat-value,
    .hardware-stat-value {
        font-size: 1.2rem;
    }
}

/* === Toast位置調整 (screen only) === */
@media screen and (max-width: 768px) {
    .toast {
        left: 50%;
        transform: translateX(-50%);
        right: auto;
        max-width: 90vw;
        bottom: 20px;
    }
}
</style>
